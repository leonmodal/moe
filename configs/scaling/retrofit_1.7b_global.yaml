# Retrofit Qwen3-1.7B dense → global shared expert pool MoE
# Backbone matches Qwen3-1.7B exactly (hidden=2048, 28 layers)
# FFN upcycled: dense intermediate_size=6144 → top-8 × 768 = 6144 active
# ~17B total params, ~1.7B active per token
experiment_name: retrofit_1.7b_global_moe

model:
  type: global_moe
  vocab_size: 151936
  hidden_size: 2048
  num_hidden_layers: 28
  head_dim: 128
  num_attention_heads: 16           # 16 × 128 = 2048 (Qwen3-1.7B architecture)
  num_key_value_heads: 8            # GQA (matches Qwen3-1.7B)
  num_experts: 1792                 # global pool (= 28 layers × 64 per-layer)
  num_experts_per_tok: 8            # top-8; active FFN = 8 × 768 = 6144 = dense intermediate
  moe_intermediate_size: 768
  intermediate_size: 6144
  norm_topk_prob: true
  router_aux_loss_coef: 0.01
  attention_bias: false
  attention_dropout: 0.0
  rms_norm_eps: 1.0e-6
  rope_theta: 1000000.0
  max_position_embeddings: 32768
  tie_word_embeddings: false
  output_router_logits: true

training:
  learning_rate: 3.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 2000
  max_steps: 100000
  min_lr_ratio: 0.1
  batch_size: 8
  gradient_accumulation: 2
  mixed_precision: bf16
  gradient_checkpointing: true
  log_every: 1
  routing_log_every: 50
  save_every: 5000
  output_dir: ./outputs/retrofit_1.7b_global_moe
  wandb_project: moe-scaling
  wandb_run_name: retrofit_1.7b_global

data:
  data_dir: ./data/parquet
  text_column: text
  seq_len: 2048
  tokenizer_name: Qwen/Qwen3-0.6B
  num_workers: 4

checkpoint:
  resume_from: null
