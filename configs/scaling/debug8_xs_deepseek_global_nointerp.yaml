# XS scale — DeepSeek V3 global MoE, global-only bias (no per-layer interpolation)
# Same as xs_deepseek_global but bias_interpolation is off (alpha=0 always)
experiment_name: new_deepseek_global_nointerp_moe

model:
  type: deepseek_global_moe
  vocab_size: 151936
  hidden_size: 1024
  num_hidden_layers: 16
  head_dim: 128
  num_attention_heads: 16
  num_key_value_heads: 8
  num_experts: 256
  num_experts_per_tok: 4
  moe_intermediate_size: 768
  intermediate_size: 3072
  norm_topk_prob: true
  router_aux_loss_coef: 0.0
  seq_aux_loss_coef: 0.0001
  bias_update_rate: 0.001
  # bias_interpolation: false (default) — purely global bias update
  topk_scaling_factor: 2.5
  num_groups: 8
  group_topk: 4
  attention_bias: false
  attention_dropout: 0.0
  rms_norm_eps: 1.0e-6
  rope_theta: 1000000.0
  max_position_embeddings: 32768
  tie_word_embeddings: true
  output_router_logits: true

training:
  learning_rate: 1.0e-3
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.95
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 8
  max_steps: 8
  min_lr_ratio: 0.1
  batch_size: 8
  gradient_accumulation: 1
  mixed_precision: bf16
  gradient_checkpointing: false
  log_every: 1
  routing_log_every: 4
  save_every: 100000
  output_dir: ./outputs/debug8_deepseek_global_nointerp_moe
  wandb_project: null
  wandb_run_name: debug8_deepseek_global_nointerp

data:
  data_dir: ./data/parquet
  text_column: text
  seq_len: 1024
  tokenizer_name: Qwen/Qwen3-0.6B
  num_workers: 4

checkpoint:
  resume_from: null
