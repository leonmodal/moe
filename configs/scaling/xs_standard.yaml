# XS scale — Qwen3-0.6B backbone, standard per-layer MoE
# 8 layers, 16 experts/layer, top-4
# Active FFN per token = 4 × 768 = 3072 = Qwen3-0.6B dense intermediate
experiment_name: xs_standard_moe

model:
  type: standard_moe
  vocab_size: 151936
  hidden_size: 1024
  num_hidden_layers: 8
  head_dim: 128
  num_attention_heads: 16           # 16 × 128 = 2048 attn dim (Qwen3-0.6B style)
  num_key_value_heads: 8            # GQA with 2 queries per KV head
  num_experts: 16                   # per layer; 16 × 8 = 128 total
  num_experts_per_tok: 4            # top-4; active FFN = 4 × 768 = 3072
  moe_intermediate_size: 768
  intermediate_size: 3072
  norm_topk_prob: true
  router_aux_loss_coef: 0.001
  attention_bias: false
  attention_dropout: 0.0
  rms_norm_eps: 1.0e-6
  rope_theta: 1000000.0
  max_position_embeddings: 32768
  tie_word_embeddings: false
  output_router_logits: true

training:
  learning_rate: 5.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 2000
  max_steps: 100000
  min_lr_ratio: 0.1
  batch_size: 32
  gradient_accumulation: 1
  mixed_precision: bf16
  gradient_checkpointing: false
  log_every: 1
  routing_log_every: 50
  save_every: 5000
  output_dir: ./outputs/xs_standard_moe
  wandb_project: moe-scaling
  wandb_run_name: xs_standard

data:
  data_dir: ./data/parquet
  text_column: text
  seq_len: 1024
  tokenizer_name: Qwen/Qwen3-0.6B
  num_workers: 4

checkpoint:
  resume_from: null
