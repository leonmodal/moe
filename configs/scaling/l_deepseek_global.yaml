# L scale — Qwen3-30B-A3B proportions, global shared MoE
# 16 layers, 2048 global experts (128 * 16), top-8
experiment_name: l_deepseek_global_moe

model:
  type: deepseek_global_moe
  vocab_size: 151936
  hidden_size: 2048
  num_hidden_layers: 16
  head_dim: 128
  num_attention_heads: 32
  num_key_value_heads: 4
  num_experts: 1024
  num_experts_per_tok: 8
  moe_intermediate_size: 768
  intermediate_size: 6144
  norm_topk_prob: true
  router_aux_loss_coef: 0.0
  seq_aux_loss_coef: 0.0001
  bias_update_rate: 0.001
  bias_interpolation: true
  topk_scaling_factor: 2.5
  num_groups: 8
  group_topk: 4
  attention_bias: false
  attention_dropout: 0.0
  rms_norm_eps: 1.0e-6
  rope_theta: 1000000.0
  max_position_embeddings: 40960
  tie_word_embeddings: false
  output_router_logits: true

training:
  learning_rate: 1.0e-3
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.95
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 1000
  max_steps: 100000
  min_lr_ratio: 0.1
  batch_size: 16
  gradient_accumulation: 1
  mixed_precision: bf16
  gradient_checkpointing: true
  log_every: 1
  routing_log_every: 50
  save_every: 1000
  output_dir: ./outputs/l_deepseek_global_moe
  wandb_project: moe-scaling
  wandb_run_name: l_deepseek_global

data:
  data_dir: ./data/parquet
  text_column: text
  seq_len: 1024
  tokenizer_name: Qwen/Qwen3-0.6B
  num_workers: 4

checkpoint:
  resume_from: null
