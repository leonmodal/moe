# XS scale — Global MoE, same total params as xs_standard
experiment_name: xs_global_moe

model:
  type: global_moe
  vocab_size: 151936
  hidden_size: 512
  num_hidden_layers: 8
  head_dim: 64
  num_attention_heads: 8
  num_key_value_heads: 2
  num_experts: 64             # global pool (= 8 layers × 8 per-layer)
  num_experts_per_tok: 2
  moe_intermediate_size: 768  # effective = top_k × 768 = 1536 = 3× hidden
  intermediate_size: 1536
  norm_topk_prob: true
  router_aux_loss_coef: 0.1
  rms_norm_eps: 1.0e-6
  rope_theta: 1000000.0
  max_position_embeddings: 40960
  tie_word_embeddings: false
  output_router_logits: true

training:
  learning_rate: 1.0e-3
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 100000
  max_steps: 1000000
  min_lr_ratio: 0.1
  batch_size: 16
  gradient_accumulation: 1
  mixed_precision: bf16
  gradient_checkpointing: false
  log_every: 1
  eval_every: 500
  routing_log_every: 1
  save_every: 2000
  output_dir: ./outputs/xs_global_moe
  wandb_project: moe-scaling
  wandb_run_name: xs_global

data:
  data_dir: ./data/parquet
  text_column: text
  seq_len: 2048
  tokenizer_name: Qwen/Qwen3-0.6B
  num_workers: 4

checkpoint:
  resume_from: null
