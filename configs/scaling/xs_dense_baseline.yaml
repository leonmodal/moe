# XS scale — Dense Qwen3 baseline matching MoE active params
# intermediate_size=3072 matches top-4 × 768 active MoE width
experiment_name: new_dense_baseline

model:
  type: dense
  vocab_size: 151936
  hidden_size: 1024
  num_hidden_layers: 16
  head_dim: 128
  num_attention_heads: 16
  num_key_value_heads: 8
  intermediate_size: 3072
  attention_bias: false
  attention_dropout: 0.0
  rms_norm_eps: 1.0e-6
  rope_theta: 1000000.0
  max_position_embeddings: 32768
  tie_word_embeddings: true

training:
  learning_rate: 1.0e-3
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.95
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 1000
  max_steps: 100000
  min_lr_ratio: 0.1
  batch_size: 32
  gradient_accumulation: 2
  mixed_precision: bf16
  gradient_checkpointing: false
  log_every: 1
  routing_log_every: 50
  save_every: 1000
  output_dir: ./outputs/new_dense_baseline
  wandb_project: moe-scaling
  wandb_run_name: new_dense_baseline

data:
  data_dir: ./data/parquet
  text_column: text
  seq_len: 1024
  tokenizer_name: Qwen/Qwen3-0.6B
  num_workers: 4

checkpoint:
  resume_from: null
