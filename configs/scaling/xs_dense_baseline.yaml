# XS scale — Dense baseline matching MoE active params
# 1 expert = effectively dense FFN with intermediate_size 3072
# Active params match top-4 × 768 = 3072 from the MoE configs
experiment_name: new_dense_baseline

model:
  type: standard_moe
  vocab_size: 151936
  hidden_size: 1024
  num_hidden_layers: 16
  head_dim: 128
  num_attention_heads: 16
  num_key_value_heads: 8
  num_experts: 1                    # single expert = dense FFN
  num_experts_per_tok: 1
  moe_intermediate_size: 3072       # matches 4 × 768 active MoE width
  intermediate_size: 3072
  norm_topk_prob: true
  router_aux_loss_coef: 0.0         # nothing to balance with 1 expert
  attention_bias: false
  attention_dropout: 0.0
  rms_norm_eps: 1.0e-6
  rope_theta: 1000000.0
  max_position_embeddings: 32768
  tie_word_embeddings: true
  output_router_logits: true

training:
  learning_rate: 1.0e-3
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.95
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 1000
  max_steps: 100000
  min_lr_ratio: 0.1
  batch_size: 64
  gradient_accumulation: 1
  mixed_precision: bf16
  gradient_checkpointing: false
  log_every: 1
  routing_log_every: 50
  save_every: 1000
  output_dir: ./outputs/new_dense_baseline
  wandb_project: moe-scaling
  wandb_run_name: new_dense_baseline

data:
  data_dir: ./data/parquet
  text_column: text
  seq_len: 1024
  tokenizer_name: Qwen/Qwen3-0.6B
  num_workers: 4

checkpoint:
  resume_from: null
