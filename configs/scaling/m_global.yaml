# M scale — Global MoE
experiment_name: m_global_moe

model:
  type: global_moe
  vocab_size: 151936
  hidden_size: 2048
  num_hidden_layers: 16
  head_dim: 128
  num_attention_heads: 16
  num_key_value_heads: 4
  num_experts: 2048           # global pool (= 16 layers × 128 per-layer)
  num_experts_per_tok: 8
  moe_intermediate_size: 768
  intermediate_size: 6144
  norm_topk_prob: true
  router_aux_loss_coef: 0.001
  rms_norm_eps: 1.0e-6
  rope_theta: 1000000.0
  max_position_embeddings: 32768
  tie_word_embeddings: false
  output_router_logits: true

training:
  learning_rate: 3.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 2000
  max_steps: 100000
  min_lr_ratio: 0.1
  batch_size: 4
  gradient_accumulation: 1
  mixed_precision: bf16
  gradient_checkpointing: false
  log_every: 1
  eval_every: 1000
  routing_log_every: 1
  save_every: 5000
  output_dir: ./outputs/m_global_moe
  wandb_project: moe-scaling
  wandb_run_name: m_global

data:
  data_dir: ./data/parquet
  text_column: text
  seq_len: 2048
  tokenizer_name: Qwen/Qwen3-0.6B
  num_workers: 4

checkpoint:
  resume_from: null
