# XS scale — Qwen3-0.6B backbone, DeepSeek V3 aux-loss-free global shared MoE
# 16 layers, 256 global experts, top-4, tied embeddings
# Hybrid: sigmoid routing with expert bias + sequence-level aux loss
experiment_name: xs_deepseek_global_moe

model:
  type: deepseek_global_moe
  vocab_size: 151936
  hidden_size: 1024
  num_hidden_layers: 16
  head_dim: 128
  num_attention_heads: 16           # 16 × 128 = 2048 attn dim (Qwen3-0.6B style)
  num_key_value_heads: 8            # GQA with 2 queries per KV head
  num_experts: 256                  # global pool (= 16 layers × 16 per-layer equivalent)
  num_experts_per_tok: 4            # top-4; active FFN = 4 × 768 = 3072
  moe_intermediate_size: 768
  intermediate_size: 3072
  norm_topk_prob: true
  router_aux_loss_coef: 0.0         # no batch-level aux loss
  seq_aux_loss_coef: 0.01           # sequence-level aux loss (DeepSeek V2/V3)
  bias_update_rate: 0.001           # expert bias update rate (DeepSeek V3)
  attention_bias: false
  attention_dropout: 0.0
  rms_norm_eps: 1.0e-6
  rope_theta: 1000000.0
  max_position_embeddings: 32768
  tie_word_embeddings: true
  output_router_logits: true

training:
  learning_rate: 1.0e-3
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.95
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 1000
  max_steps: 1000000
  min_lr_ratio: 0.1
  batch_size: 64
  gradient_accumulation: 1
  mixed_precision: bf16
  gradient_checkpointing: false
  log_every: 1
  routing_log_every: 50
  save_every: 5000
  output_dir: ./outputs/xs_deepseek_global_moe
  wandb_project: moe-scaling
  wandb_run_name: xs_deepseek_global

data:
  data_dir: ./data/parquet
  text_column: text
  seq_len: 1024
  tokenizer_name: Qwen/Qwen3-0.6B
  num_workers: 4

checkpoint:
  resume_from: null
